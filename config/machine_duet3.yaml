# Rotoforge Slicer — machine + process configuration
# See docs/rotoforge_slicer_SPEC.md §7. Values from hardware_info.md / misc.md.

machine:
  name: duet3
  rotary_axis_letter: A          # functionally a C axis (about Z); rename to C after firmware change
  build_volume_mm: [380, 235, 250]
  feedrate_mode: per_segment_compensation   # per_segment_compensation | firmware_excludes_rotary
  steps:
    x: 80
    y: 80
    z: 400
    e_per_mm: 46.73              # recalibrated 2026-05-03
    a_per_deg: 26.667

c_axis:
  home_heading_deg: 90           # +Y is 90 deg CCW from +X
  home_offset_deg: 0
  invert_sign: 1                 # +1 or -1; calibrate to firmware M569 direction
  wedge_half_angle_deg: 90       # reachable C range: +Y +/- 90 deg (GUI-adjustable 0..180)
  max_speed_deg_s: 360.0         # measured on hardware: 360 deg/s -> R_min = v/omega

spindle:
  rpm_min: 5000
  rpm_max: 30000

process:
  bead_width_mm: 1.0             # the 1 mm rim edge = fill resolution
  layer_height_mm: 0.12          # range 0.10-0.15
  wire_diameter_mm: 0.50
  wheel_diameter_mm: 50.0        # tungsten-carbide wheel; the 50 mm collision body (SPEC §1.5)
  raster_overlap: 0.15
  min_deposit_len_mm: 6.0
  inter_pass_lift_mm: 10.0
  lead_in_len_mm: 2.0            # moving-plunge forward distance (SPEC §4.4)
  approach_clearance_mm: 0.5     # airborne gap above the surface before the moving plunge
  lead_out_len_mm: 4.0
  travel_z_mm: 10.0
  startup_settle_ms: 10000       # airborne
  spindle_dwell_ms: 2000         # airborne only; keep < 6000
  cpap_deposit: 255
  bed_temp_c: 110
  hotshoe_macro: Hotshoe_300C.g

extrusion:
  mode: screener                 # screener | x | volume
  x_ratio: 1.0

screener:
  csv_path: ""                   # path to FRAM screener "Export CSV"
  revs_per_mm_mode: auto         # auto | manual
  revs_per_mm_target: 0.0        # used when mode == manual
  revs_per_mm_tol: 5.0           # rpm/(mm/min)

gcode:
  preamble_macros: [Hotshoe_300C.g, CPAP_100pct.g]
  postamble_macros: [CPAP_OFF.g, Hotshoe_OFF.g]
  use_relative_e: true

emit:                            # G-code feedrate primitives (SPEC §6), mm/min
  feed_travel_mm_min: 2500.0     # rapid / airborne travel
  feed_z_mm_min: 300.0           # Z plunge / lift
  feed_dep_mm_min: 120.0         # deposition traverse (default v until screener, M3)
  dry_run: false                 # true => spindle/heaters/fan/E disabled (motion test)

collision:                       # 2.5D swept-disc + leading-wire check (SPEC §4.6)
  enabled: true
  cell_mm: 0.0                   # height-field cell; 0 => bead_width/2
  clearance_mm: 0.3              # required gap between the 50 mm disc body and existing material
  wire_lead_mm: 2.0              # how far the fragile leading wire reaches ahead of contact

fill:                            # fill strategy (SPEC §4.2)
  mode: raster                   # raster | streamline
  crosshatch: false              # alternate the deposition heading between layers
  crosshatch_angle_deg: 30.0     # +/- offset from +Y on alternating layers (<= wedge half-angle)
  streamline_step_mm: 0.5        # streamline integration step
  streamline_curl: 0.6           # 0 = straight +Y; higher = follows the region boundary more
